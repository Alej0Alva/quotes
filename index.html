<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget de Citas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: black;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .quote-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
            margin-bottom: 20px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .change-quote-button {
            background-color: rgb(255, 0, 0);
            border: none;
            width: 15px;
            height: 15px;
            border-radius: 10%;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="quote-container" id="quoteContainer">
        <p id="quoteText"></p>
    </div>
    <button class="change-quote-button" id="changeQuoteButton"></button>

    <script>
        let quotes = [];
        let shuffledQuotes = [];
        let currentIndex = 0;
        let intervalId;

        async function fetchQuotes() {
            const response = await fetch('quotes.json');
            quotes = await response.json();
            shuffleQuotes();
        }

        function shuffleQuotes() {
            shuffledQuotes = [...quotes];
            for (let i = shuffledQuotes.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledQuotes[i], shuffledQuotes[j]] = [shuffledQuotes[j], shuffledQuotes[i]];
            }
            currentIndex = 0;
        }

        function displayQuote() {
            const quoteText = document.getElementById('quoteText');
            quoteText.textContent = shuffledQuotes[currentIndex].filtro;
            currentIndex++;
            if (currentIndex >= shuffledQuotes.length) {
                shuffleQuotes();
            }
        }

        async function initQuotes() {
            await fetchQuotes();
            displayQuote();
            intervalId = setInterval(displayQuote, 190000);
        }

        document.getElementById('changeQuoteButton').addEventListener('click', () => {
            clearInterval(intervalId);
            displayQuote();
            intervalId = setInterval(displayQuote, 190000);
        });

        initQuotes();
    </script>
</body>
</html>

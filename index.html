<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget de Citas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: url('jameswebb.jpg') no-repeat center center fixed; /* Cambia URL_DE_TU_IMAGEN por la URL de tu imagen */
            background-size: cover;
            margin: 0; /* Eliminar márgenes para evitar barras de desplazamiento innecesarias */
        }
        .quote-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            text-align: center;
            margin-bottom: 10px;
        }
        .change-quote-button {
            background-color: black;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="quote-container" id="quoteContainer">
        <p id="quoteText"></p>
    </div>
    <button class="change-quote-button" id="changeQuoteButton"></button>

    <script>
        let quotes = [];
        let intervalId;

        async function fetchQuotes() {
            const response = await fetch('quotes.json');
            quotes = await response.json();
        }

        function displayQuote() {
            const quoteText = document.getElementById('quoteText');
            const randomIndex = Math.floor(Math.random() * quotes.length);
            quoteText.textContent = quotes[randomIndex].filtro;
        }

        async function initQuotes() {
            await fetchQuotes();
            displayQuote();
            intervalId = setInterval(displayQuote, 190000); // Cambia cada 1 minuto
        }

        document.getElementById('changeQuoteButton').addEventListener('click', () => {
            clearInterval(intervalId); // Limpiar el intervalo para evitar superposiciones
            displayQuote();
            intervalId = setInterval(displayQuote, 190000); // Reiniciar el intervalo
        });

        // Initialize the quotes on page load
        initQuotes();
    </script>
</body>
</html>
